    <rect x="40" y="136" width="12" height="12" rx="1.5"/>
    <rect x="40" y="160" width="12" height="12" rx="1.5"/>

    <!-- Alignment pattern (bottom-right) -->
    <rect x="192" y="192" width="28" height="28" rx="5"/>
    <rect x="198" y="198" width="16" height="16" rx="3" fill="white"/>
    <rect x="203" y="203" width="6" height="6" rx="1"/>

    <!-- Data modules — dense grid pattern -->
