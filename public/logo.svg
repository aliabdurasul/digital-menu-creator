<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- QR-style icon — dense data pattern, transparent bg, app primary orange -->
  <g fill="#F35916">
    <!-- Top-left finder -->
    <rect x="20" y="20" width="56" height="56" rx="8"/>
    <rect x="32" y="32" width="32" height="32" rx="4" fill="white"/>
    <rect x="40" y="40" width="16" height="16" rx="2"/>
    <!-- Top-right finder -->
    <rect x="180" y="20" width="56" height="56" rx="8"/>
    <rect x="192" y="32" width="32" height="32" rx="4" fill="white"/>
    <rect x="200" y="40" width="16" height="16" rx="2"/>
    <!-- Bottom-left finder -->
    <rect x="20" y="180" width="56" height="56" rx="8"/>
    <rect x="32" y="192" width="32" height="32" rx="4" fill="white"/>
    <rect x="40" y="200" width="16" height="16" rx="2"/>

    <!-- Horizontal timing strip -->
    <rect x="88" y="40" width="12" height="12" rx="1.5"/>
    <rect x="112" y="40" width="12" height="12" rx="1.5"/>
    <rect x="136" y="40" width="12" height="12" rx="1.5"/>
    <rect x="160" y="40" width="12" height="12" rx="1.5"/>
